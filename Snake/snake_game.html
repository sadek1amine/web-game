
<style>
*{margin:0;padding:0;box-sizing:border-box}
#gw{background:#0d0d0d;display:flex;flex-direction:column;align-items:center;padding:16px 0;font-family:var(--font-mono);width:100%;color:#fff}
#title{font-size:20px;font-weight:500;letter-spacing:5px;color:#4f4;margin-bottom:12px}
#arena{display:flex;gap:16px;align-items:flex-start}
#gc{display:block;border:2px solid #1a1a1a}
#side{width:110px;display:flex;flex-direction:column;gap:12px}
.panel{background:#111;border:1px solid #1e1e1e;border-radius:6px;padding:10px}
.plabel{font-size:10px;color:#444;letter-spacing:2px;margin-bottom:5px}
.pval{font-size:22px;font-weight:500;color:#4f4}
#overlay{position:absolute;inset:0;background:rgba(0,0,0,0.82);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
#overlay h2{font-size:22px;letter-spacing:3px;color:#4f4}
#overlay p{font-size:12px;color:#666}
#overlay button{padding:8px 26px;background:transparent;border:1px solid #4f4;color:#4f4;font-size:13px;font-family:var(--font-mono);cursor:pointer;border-radius:4px;letter-spacing:2px}
#overlay button:hover{background:#4f41}
#wrap{position:relative}
#keys{font-size:10px;color:#2a2a2a;line-height:2;letter-spacing:0.5px}
</style>
<h2 class="sr-only">Snake game. Use arrow keys or WASD to steer the snake. Eat food to grow. Avoid walls and yourself.</h2>
<div id="gw">
  <div id="title">SNAKE</div>
  <div id="arena">
    <div id="wrap">
      <canvas id="gc" width="420" height="420"></canvas>
      <div id="overlay">
        <h2>SNAKE</h2>
        <p>Eat food — don't hit yourself</p>
        <button id="startBtn">PLAY</button>
      </div>
    </div>
    <div id="side">
      <div class="panel"><div class="plabel">SCORE</div><div class="pval" id="sc">0</div></div>
      <div class="panel"><div class="plabel">BEST</div><div class="pval" id="hi">0</div></div>
      <div class="panel"><div class="plabel">LENGTH</div><div class="pval" id="ln">1</div></div>
      <div class="panel"><div class="plabel">LEVEL</div><div class="pval" id="lv">1</div></div>
      <div class="panel" style="background:transparent;border:none;padding:2px 0">
        <div id="keys">← → ↑ ↓<br>or WASD<br>to steer<br><br>Swipe<br>on mobile</div>
      </div>
    </div>
  </div>
</div>
<script>
const C=document.getElementById('gc'),ctx=C.getContext('2d');
const COLS=21,ROWS=21,CELL=20;
C.width=COLS*CELL;C.height=ROWS*CELL;

let snake,dir,nextDir,food,bonus,score,best=0,gameState,tick,tickMs,level,ate,particles,bonusTimer,rainbowT;

function rnd(max){return Math.floor(Math.random()*max);}

function freeCell(){
  let tries=0,c;
  do{c={x:rnd(COLS),y:rnd(ROWS)};tries++;}
  while(tries<200&&snake.some(s=>s.x===c.x&&s.y===c.y));
  return c;
}

function init(){
  let cx=Math.floor(COLS/2),cy=Math.floor(ROWS/2);
  snake=[{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  food=freeCell();bonus=null;bonusTimer=0;
  score=0;level=1;ate=0;particles=[];rainbowT=0;
  tickMs=180;
  gameState='playing';
  document.getElementById('overlay').style.display='none';
  updateHUD();
  clearInterval(tick);
  tick=setInterval(step,tickMs);
}

function updateHUD(){
  document.getElementById('sc').textContent=score;
  document.getElementById('hi').textContent=best;
  document.getElementById('ln').textContent=snake.length;
  document.getElementById('lv').textContent=level;
}

function spawnParticles(x,y,col,n){
  for(let i=0;i<n;i++){
    let a=Math.random()*Math.PI*2,sp=1+Math.random()*3;
    particles.push({x:x*CELL+CELL/2,y:y*CELL+CELL/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,col});
  }
}

function step(){
  if(gameState!=='playing')return;
  dir={...nextDir};
  let head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};

  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){
    die();return;
  }

  let grew=false;
  if(head.x===food.x&&head.y===food.y){
    score+=10*level;grew=true;ate++;
    spawnParticles(food.x,food.y,'#4f4',8);
    food=freeCell();
    if(ate%5===0&&!bonus)spawnBonus();
    if(ate%7===0){level++;clearInterval(tick);tickMs=Math.max(60,tickMs-18);tick=setInterval(step,tickMs);}
  }
  if(bonus&&head.x===bonus.x&&head.y===bonus.y){
    score+=50*level;grew=true;
    spawnParticles(bonus.x,bonus.y,'#ff0',14);
    bonus=null;bonusTimer=0;
  }

  snake.unshift(head);
  if(!grew)snake.pop();
  if(score>best)best=score;

  if(bonus){bonusTimer--;if(bonusTimer<=0)bonus=null;}
  updateHUD();
  drawFrame();
}

function spawnBonus(){
  bonus=freeCell();
  while(bonus.x===food.x&&bonus.y===food.y)bonus=freeCell();
  bonusTimer=40;
}

function die(){
  gameState='over';clearInterval(tick);
  spawnParticles(snake[0].x,snake[0].y,'#f44',20);
  drawFrame();
  setTimeout(()=>showOverlay('GAME OVER','Score: '+score,'RESTART'),600);
}

function showOverlay(h,p,btn){
  let ov=document.getElementById('overlay');
  ov.innerHTML=`<h2>${h}</h2><p>${p}</p><button id="startBtn">${btn}</button>`;
  ov.style.display='flex';
  document.getElementById('startBtn').addEventListener('click',init);
}

function segColor(i,total){
  let t=i/Math.max(total-1,1);
  let r=Math.round(20+t*30),g=Math.round(220-t*80),b=Math.round(20+t*20);
  return`rgb(${r},${g},${b})`;
}

function drawFrame(){
  rainbowT++;
  ctx.fillStyle='#0d0d0d';ctx.fillRect(0,0,C.width,C.height);

  ctx.strokeStyle='#141414';ctx.lineWidth=0.5;
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(C.width,r*CELL);ctx.stroke();}
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,C.height);ctx.stroke();}

  for(let i=snake.length-1;i>=0;i--){
    let s=snake[i],x=s.x*CELL,y=s.y*CELL;
    ctx.fillStyle=segColor(i,snake.length);
    let r=i===0?5:3;
    roundRect(ctx,x+1,y+1,CELL-2,CELL-2,r);ctx.fill();
    if(i===0){
      ctx.fillStyle='rgba(255,255,255,0.15)';
      roundRect(ctx,x+2,y+2,CELL-4,6,2);ctx.fill();
    }
  }

  let head=snake[0];
  ctx.fillStyle='#0d0d0d';
  let ew=3,eh=3;
  if(dir.x!==0){
    let ex=dir.x>0?head.x*CELL+CELL-5:head.x*CELL+2;
    ctx.fillRect(ex,head.y*CELL+4,ew,eh);
    ctx.fillRect(ex,head.y*CELL+CELL-4-eh,ew,eh);
  }else{
    let ey=dir.y>0?head.y*CELL+CELL-5:head.y*CELL+2;
    ctx.fillRect(head.x*CELL+4,ey,ew,eh);
    ctx.fillRect(head.x*CELL+CELL-4-ew,ey,ew,eh);
  }

  let fp=Math.sin(rainbowT*0.15)*2;
  ctx.fillStyle='#f33';
  roundRect(ctx,food.x*CELL+3+fp,food.y*CELL+3+fp,CELL-6-fp*2,CELL-6-fp*2,4);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.fillRect(food.x*CELL+5,food.y*CELL+4,4,3);
  ctx.fillStyle='#4a0';
  ctx.fillRect(food.x*CELL+CELL/2-1,food.y*CELL+1,2,4);

  if(bonus){
    let bp=Math.sin(rainbowT*0.25)*2;
    let hue=(rainbowT*4)%360;
    ctx.fillStyle=`hsl(${hue},100%,55%)`;
    roundRect(ctx,bonus.x*CELL+3,bonus.y*CELL+3,CELL-6,CELL-6,CELL/2-3);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.font='500 11px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('★',bonus.x*CELL+CELL/2,bonus.y*CELL+CELL/2);
    if(bonusTimer<12){ctx.strokeStyle='rgba(255,255,0,0.5)';ctx.lineWidth=1.5;
      roundRect(ctx,bonus.x*CELL+1,bonus.y*CELL+1,CELL-2,CELL-2,CELL/2-1);ctx.stroke();}
  }

  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.col;
    ctx.fillRect(p.x-2,p.y-2,4,4);
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=0.06;
  });
  ctx.globalAlpha=1;
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

document.addEventListener('keydown',e=>{
  if(gameState!=='playing')return;
  const m={'ArrowLeft':{x:-1,y:0},'ArrowRight':{x:1,y:0},'ArrowUp':{x:0,y:-1},'ArrowDown':{x:0,y:1},
    'a':{x:-1,y:0},'d':{x:1,y:0},'w':{x:0,y:-1},'s':{x:0,y:1},
    'A':{x:-1,y:0},'D':{x:1,y:0},'W':{x:0,y:-1},'S':{x:0,y:1}};
  let d=m[e.key];
  if(d&&!(d.x===-dir.x&&d.y===0)&&!(d.y===-dir.y&&d.x===0)){nextDir=d;e.preventDefault();}
});

let touchStart=null;
C.addEventListener('touchstart',e=>{touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY};e.preventDefault();},{passive:false});
C.addEventListener('touchend',e=>{
  if(!touchStart)return;
  let dx=e.changedTouches[0].clientX-touchStart.x,dy=e.changedTouches[0].clientY-touchStart.y;
  if(Math.abs(dx)<10&&Math.abs(dy)<10)return;
  if(Math.abs(dx)>Math.abs(dy)){
    let d=dx>0?{x:1,y:0}:{x:-1,y:0};
    if(!(d.x===-dir.x))nextDir=d;
  }else{
    let d=dy>0?{x:0,y:1}:{x:0,y:-1};
    if(!(d.y===-dir.y))nextDir=d;
  }
  e.preventDefault();
},{passive:false});

document.getElementById('startBtn').addEventListener('click',init);
</script>
