
<style>
*{margin:0;padding:0;box-sizing:border-box}
#gw{background:#0a0008;display:flex;flex-direction:column;align-items:center;padding:12px 0;font-family:var(--font-mono);width:100%;color:#fff}
#title{font-size:17px;letter-spacing:5px;color:#f80;margin-bottom:8px;text-shadow:0 0 12px #f80a}
#hud{display:flex;gap:22px;margin-bottom:7px;font-size:12px;letter-spacing:1px}
.hl{color:#444}.hv{color:#f80;font-weight:500}
#wrap{position:relative}
#gc{display:block}
#overlay{position:absolute;inset:0;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px}
#overlay h2{font-size:22px;letter-spacing:4px;color:#f80;text-shadow:0 0 14px #f80}
#overlay p{font-size:11px;color:#666;text-align:center;line-height:2}
#overlay button{padding:8px 26px;background:transparent;border:1px solid #f80;color:#f80;font-size:12px;font-family:var(--font-mono);cursor:pointer;border-radius:4px;letter-spacing:2px}
#overlay button:hover{background:#f801}
</style>
<div id="gw">
  <div id="title">DONKEY KONG</div>
  <div id="hud">
    <span><span class="hl">SCORE </span><span class="hv" id="sc">0</span></span>
    <span><span class="hl">LIVES </span><span class="hv" id="lv">3</span></span>
    <span><span class="hl">LEVEL </span><span class="hv" id="lv2">1</span></span>
    <span><span class="hl">HI </span><span class="hv" id="hi">0</span></span>
  </div>
  <div id="wrap">
    <canvas id="gc" width="420" height="480"></canvas>
    <div id="overlay">
      <h2>DONKEY KONG</h2>
      <p>← → to move &nbsp;·&nbsp; ↑ to climb ladders<br>Space / ↑ to jump over barrels<br>Reach the top to rescue the princess!<br>Jump over barrels for bonus points</p>
      <button id="startBtn">START</button>
    </div>
  </div>
</div>
<script>
const C=document.getElementById('gc'),ctx=C.getContext('2d');
const W=420,H=480;

// Platform layout: each platform has {x, y, w} and optional ladder positions
// Tilted platforms like original DK
const PLATFORMS=[
  {x:0,   y:440, w:420, tilt:0},   // ground floor
  {x:20,  y:380, w:380, tilt:-3},  // floor 4
  {x:20,  y:310, w:380, tilt:3},   // floor 3
  {x:20,  y:240, w:380, tilt:-3},  // floor 2
  {x:20,  y:170, w:380, tilt:3},   // floor 1
  {x:20,  y:100, w:380, tilt:0},   // top floor
];

const LADDERS=[
  {x:60,  top:380, bot:440},
  {x:340, top:380, bot:440},
  {x:100, top:310, bot:380},
  {x:300, top:310, bot:380},
  {x:60,  top:240, bot:310},
  {x:330, top:240, bot:310},
  {x:110, top:170, bot:240},
  {x:290, top:170, bot:240},
  {x:70,  top:100, bot:170},
  {x:320, top:100, bot:170},
];

let mario,barrels,particles,score,hi=0,lives,level,gameState,keys,raf;
let dkAnim=0,dkThrowTimer=0,barrelSpawnTimer=0,flashTimer=0;
let princessAnim=0,fireParticles=[];
let jumpPressed=false;

const MARIO_SPD=2.8, JUMP_POWER=-9.5, GRAVITY=0.45, BARREL_SPD_BASE=1.8;

function platformYAt(p, x){
  // tilt: degrees-ish in pixels over width
  let t=p.tilt||0;
  let frac=(x-p.x)/p.w;
  return p.y + frac*t;
}

function onPlatform(mx, my, mw, mh){
  for(let p of PLATFORMS){
    let py=platformYAt(p,mx+mw/2);
    if(mx+mw>p.x && mx<p.x+p.w && my+mh>=py-2 && my+mh<=py+10){
      return {platform:p, y:py};
    }
  }
  return null;
}

function initMario(){
  mario={x:30, y:410, vx:0, vy:0, onGround:false, onLadder:false,
    climbing:false, dead:false, deathTimer:0, facing:1, walkAnim:0,
    jumpScore:false, invince:0};
}

function makeBarrel(level){
  let spd=(BARREL_SPD_BASE+level*0.25)*(Math.random()<0.5?1:-1);
  return{x:50, y:88, vx:spd, vy:0, onGround:false, row:5, rolling:0, dead:false, deathTimer:0};
}

function init(keepScore){
  if(!keepScore){score=0;lives=3;level=1;}
  barrels=[];particles=[];fireParticles=[];
  dkThrowTimer=120;barrelSpawnTimer=0;flashTimer=0;
  initMario();
  gameState='playing';
  document.getElementById('overlay').style.display='none';
  updateHUD();
  if(raf)cancelAnimationFrame(raf);
  raf=requestAnimationFrame(loop);
}

function updateHUD(){
  document.getElementById('sc').textContent=score;
  document.getElementById('lv').textContent=lives;
  document.getElementById('lv2').textContent=level;
  document.getElementById('hi').textContent=hi;
}

function showOverlay(h,p,btn){
  let ov=document.getElementById('overlay');
  ov.innerHTML=`<h2>${h}</h2><p>${p}</p><button id="startBtn">${btn}</button>`;
  ov.style.display='flex';
  document.getElementById('startBtn').addEventListener('click',()=>init(false));
}

function spawnParticles(x,y,col,n){
  for(let i=0;i<n;i++){
    let a=Math.random()*Math.PI*2,sp=1.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:1,col,size:2+Math.random()*2.5});
  }
}

function nearLadder(mx,my,mh){
  for(let l of LADDERS){
    let cx=mx+14;
    if(Math.abs(cx-l.x-8)<18 && my+mh>l.top && my<l.bot) return l;
  }
  return null;
}

function update(){
  if(gameState!=='playing')return;
  dkAnim=(dkAnim+0.04)%1;
  princessAnim=(princessAnim+0.03)%1;
  if(flashTimer>0)flashTimer--;

  // Barrels spawn
  barrelSpawnTimer++;
  let spawnRate=Math.max(80,160-level*15);
  if(barrelSpawnTimer>spawnRate && barrels.length<6){
    barrels.push(makeBarrel(level));barrelSpawnTimer=0;
  }

  // DK throw animation
  dkThrowTimer--;
  if(dkThrowTimer<=0)dkThrowTimer=Math.max(70,120-level*10);

  // Mario movement
  if(!mario.dead){
    mario.invince=Math.max(0,mario.invince-1);
    let onGnd=onPlatform(mario.x,mario.y,28,32);
    mario.onGround=!!onGnd;
    let ladder=nearLadder(mario.x,mario.y,32);

    // Ladder climb
    if((keys['ArrowUp']||keys['w']||keys['W'])&&ladder&&!mario.onLadder){
      if(mario.y+32>ladder.top && mario.y<ladder.bot){mario.climbing=true;mario.onLadder=true;}
    }
    if((keys['ArrowDown']||keys['s']||keys['S'])&&ladder&&mario.onGround){
      mario.climbing=true;mario.onLadder=true;
    }
    if(mario.climbing&&(!ladder||mario.y+32<ladder.top||mario.y>ladder.bot+10)){mario.climbing=false;mario.onLadder=false;}

    if(mario.climbing){
      mario.vx=0;mario.vy=0;
      if(keys['ArrowUp']||keys['w']||keys['W'])mario.y-=2;
      if(keys['ArrowDown']||keys['s']||keys['S'])mario.y+=2;
      let lCheck=nearLadder(mario.x,mario.y,32);
      if(!lCheck){mario.climbing=false;mario.onLadder=false;}
    } else {
      // Horizontal
      if(keys['ArrowLeft']||keys['a']||keys['A']){mario.vx=-MARIO_SPD;mario.facing=-1;}
      else if(keys['ArrowRight']||keys['d']||keys['D']){mario.vx=MARIO_SPD;mario.facing=1;}
      else mario.vx=0;

      // Jump
      if((keys[' ']||keys['ArrowUp']||keys['w']||keys['W'])&&mario.onGround&&!jumpPressed){
        mario.vy=JUMP_POWER;mario.onGround=false;jumpPressed=true;mario.jumpScore=false;
      }
      if(!(keys[' ']||keys['ArrowUp']||keys['w']||keys['W']))jumpPressed=false;

      mario.vy+=GRAVITY;
      mario.vy=Math.min(mario.vy,12);
      mario.y+=mario.vy;
      mario.x+=mario.vx;

      // Walk anim
      if(mario.vx!==0)mario.walkAnim+=0.25;

      // Clamp horizontal
      mario.x=Math.max(0,Math.min(W-28,mario.x));

      // Platform landing
      let pg=onPlatform(mario.x,mario.y,28,32);
      if(pg&&mario.vy>=0){
        mario.y=pg.y-32;mario.vy=0;mario.onGround=true;
      }

      // Fall off bottom
      if(mario.y>H+10){die();return;}
    }

    // Check reach top (princess)
    if(mario.y<115&&mario.x>140&&mario.x<260){
      winLevel();return;
    }
  } else {
    mario.deathTimer--;
    if(mario.deathTimer<=0){
      if(lives<=0){showOverlay('GAME OVER','Score: '+score,'PLAY AGAIN');gameState='over';}
      else{initMario();gameState='playing';}
    }
  }

  // Barrels
  for(let b of barrels){
    if(b.dead){b.deathTimer--;if(b.deathTimer<=0)b.dead=true;continue;}
    b.rolling=(b.rolling+0.2)%1;
    b.vy+=GRAVITY*0.9;
    b.vy=Math.min(b.vy,10);
    b.y+=b.vy;b.x+=b.vx;

    // Platform collision
    let pg=onPlatform(b.x,b.y,20,18);
    if(pg&&b.vy>=0){
      b.y=pg.y-18;b.vy=0;
      // Reverse at edges & occasionally random
      if(b.x<30||b.x>W-30||Math.random()<0.015)b.vx=-b.vx;
    }
    // Fall off
    if(b.y>H+10){b.dead=true;continue;}
    // Clamp
    if(b.x<5){b.vx=Math.abs(b.vx);} if(b.x>W-25){b.vx=-Math.abs(b.vx);}

    // Jump-over score
    if(!mario.dead&&mario.vy<-2&&!mario.jumpScore){
      if(Math.abs(mario.x+14-b.x-10)<32&&Math.abs(mario.y+16-b.y-9)<36){
        mario.jumpScore=true;score+=100;if(score>hi)hi=score;
        spawnParticles(b.x+10,b.y,'#ff0',6);updateHUD();
      }
    }

    // Collision with mario
    if(!mario.dead&&mario.invince===0&&!mario.climbing){
      if(mario.x+24>b.x+3&&mario.x+4<b.x+17&&mario.y+30>b.y+2&&mario.y+4<b.y+16){
        die();
      }
    }
  }
  barrels=barrels.filter(b=>!b.dead||b.deathTimer>0);

  // Particles
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.06;p.life-=0.03;return p.life>0;});

  // Fire particles at DK area
  if(Math.random()<0.3)fireParticles.push({x:80+Math.random()*20,y:70+Math.random()*10,vy:-(1+Math.random()),vx:(Math.random()-0.5)*1.5,life:1,size:3+Math.random()*4});
  fireParticles=fireParticles.filter(fp=>{fp.x+=fp.vx;fp.y+=fp.vy;fp.life-=0.04;return fp.life>0;});
}

function die(){
  if(mario.dead)return;
  mario.dead=true;mario.deathTimer=80;
  lives--;updateHUD();
  spawnParticles(mario.x+14,mario.y+16,'#f44',14);
  if(lives<=0)setTimeout(()=>{if(gameState!=='over'){gameState='over';showOverlay('GAME OVER','Score: '+score,'PLAY AGAIN');}},900);
}

function winLevel(){
  gameState='levelup';score+=500+level*100;if(score>hi)hi=score;updateHUD();
  spawnParticles(W/2,120,'#f80',20);spawnParticles(W/2,120,'#ff0',16);
  level++;barrels=[];
  setTimeout(()=>{initMario();barrels=[];dkThrowTimer=120;gameState='playing';},1500);
}

// ---- DRAW ----
function drawPlatforms(){
  PLATFORMS.forEach((p,i)=>{
    let tilt=p.tilt||0;
    let y1=p.y, y2=p.y+tilt;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(p.x, y1);ctx.lineTo(p.x+p.w, y2);
    ctx.lineTo(p.x+p.w, y2+12);ctx.lineTo(p.x, y1+12);ctx.closePath();
    let g=ctx.createLinearGradient(p.x,p.y,p.x,p.y+12);
    g.addColorStop(0,'#e87a22');g.addColorStop(1,'#8b3a00');
    ctx.fillStyle=g;ctx.fill();
    ctx.strokeStyle='#f8a040';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(p.x,y1);ctx.lineTo(p.x+p.w,y2);ctx.stroke();
    ctx.restore();
    // Rivet dots
    ctx.fillStyle='#f8c060';
    for(let rx=p.x+20;rx<p.x+p.w-10;rx+=28){
      let ry=platformYAt(p,rx)+5;
      ctx.beginPath();ctx.arc(rx,ry,3,0,Math.PI*2);ctx.fill();
    }
  });
}

function drawLadders(){
  LADDERS.forEach(l=>{
    ctx.fillStyle='#c87830';
    ctx.fillRect(l.x,l.top,4,l.bot-l.top);
    ctx.fillRect(l.x+12,l.top,4,l.bot-l.top);
    ctx.fillStyle='#a85820';
    for(let y=l.top+8;y<l.bot;y+=12){ctx.fillRect(l.x,y,16,4);}
    ctx.fillStyle='#e89040';
    ctx.fillRect(l.x,l.top,2,l.bot-l.top);
    ctx.fillRect(l.x+12,l.top,2,l.bot-l.top);
  });
}

function drawDK(){
  let bx=55,by=38;
  let sway=Math.sin(dkAnim*Math.PI*2)*3;
  let throwing=dkThrowTimer<25;
  ctx.save();ctx.translate(bx+sway,by);
  // Body
  ctx.fillStyle='#6b3010';ctx.beginPath();ctx.ellipse(20,30,22,26,0,0,Math.PI*2);ctx.fill();
  // Chest
  ctx.fillStyle='#c87840';ctx.beginPath();ctx.ellipse(20,32,12,16,0,0,Math.PI*2);ctx.fill();
  // Head
  ctx.fillStyle='#5a2808';ctx.beginPath();ctx.ellipse(20,8,18,16,0,0,Math.PI*2);ctx.fill();
  // Face
  ctx.fillStyle='#c87840';ctx.beginPath();ctx.ellipse(20,12,10,8,0,0,Math.PI*2);ctx.fill();
  // Eyes
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(14,6,4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(26,6,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';ctx.beginPath();ctx.arc(15,6,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(27,6,2,0,Math.PI*2);ctx.fill();
  // Nostrils
  ctx.fillStyle='#3a1800';ctx.fillRect(16,12,3,2);ctx.fillRect(22,12,3,2);
  // Mouth (angry)
  ctx.strokeStyle='#3a1800';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(13,17);ctx.lineTo(27,17);ctx.stroke();
  // Arms
  ctx.fillStyle='#6b3010';
  if(throwing){
    ctx.fillRect(-8,18,14,8);ctx.beginPath();ctx.arc(-8,18,8,0,Math.PI*2);ctx.fill();
    ctx.fillRect(34,12,14,8);ctx.beginPath();ctx.arc(48,12,8,0,Math.PI*2);ctx.fill();
  } else {
    ctx.fillRect(-8,22,14,8);ctx.beginPath();ctx.arc(-8,24,8,0,Math.PI*2);ctx.fill();
    ctx.fillRect(36,22,14,8);ctx.beginPath();ctx.arc(50,24,8,0,Math.PI*2);ctx.fill();
  }
  // Legs
  ctx.fillRect(8,52,12,12);ctx.fillRect(22,52,12,12);
  ctx.restore();

  // Tie
  ctx.fillStyle='#f00';ctx.save();ctx.translate(bx+sway+18,by+28);
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(4,14);ctx.lineTo(-4,14);ctx.closePath();ctx.fill();ctx.restore();
}

function drawPrincess(){
  let px=200,py=82;
  let bob=Math.sin(princessAnim*Math.PI*2)*2;
  ctx.save();ctx.translate(px,py+bob);
  // Dress
  ctx.fillStyle='#f0a0ff';ctx.beginPath();ctx.moveTo(-10,10);ctx.lineTo(-16,36);ctx.lineTo(16,36);ctx.lineTo(10,10);ctx.closePath();ctx.fill();
  // Body
  ctx.fillStyle='#ffe0c0';ctx.fillRect(-7,0,14,12);
  // Head
  ctx.fillStyle='#ffe0c0';ctx.beginPath();ctx.arc(0,-8,10,0,Math.PI*2);ctx.fill();
  // Hair
  ctx.fillStyle='#f8c000';ctx.beginPath();ctx.arc(0,-8,10,Math.PI,0);ctx.fill();
  ctx.fillRect(-10,-12,20,6);
  // Eyes
  ctx.fillStyle='#333';ctx.beginPath();ctx.arc(-3,-8,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(3,-8,1.5,0,Math.PI*2);ctx.fill();
  // Smile
  ctx.strokeStyle='#a05030';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(-3,-3);ctx.quadraticCurveTo(0,-1,3,-3);ctx.stroke();
  // Arms up (distress)
  ctx.fillStyle='#ffe0c0';ctx.fillRect(-20,-2,10,6);ctx.fillRect(10,-2,10,6);
  // Heart above
  ctx.fillStyle='rgba(255,100,200,0.6)';
  ctx.font='12px monospace';ctx.textAlign='center';ctx.fillText('♥',0,-26);
  ctx.restore();
}

function drawBarrel(b){
  ctx.save();ctx.translate(b.x+10,b.y+9);
  ctx.rotate(b.rolling*Math.PI*2*(b.vx>0?1:-1));
  ctx.fillStyle='#8b4510';ctx.beginPath();ctx.ellipse(0,0,10,9,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#f8c040';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,8,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle='#f8c040';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(-6,0);ctx.lineTo(6,0);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-7);ctx.lineTo(0,7);ctx.stroke();
  ctx.restore();
}

function drawMario(){
  if(mario.dead&&mario.deathTimer<70)return;
  let x=mario.x,y=mario.y;
  let walk=mario.climbing?0:Math.sin(mario.walkAnim)*4;
  if(mario.invince>0&&Math.floor(mario.invince/5)%2===0)return;
  ctx.save();ctx.translate(x+14,y+16);
  if(mario.facing===-1)ctx.scale(-1,1);
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(0,18,10,4,0,0,Math.PI*2);ctx.fill();
  // Legs
  ctx.fillStyle='#1a5be8';
  ctx.fillRect(-8,8+walk,8,10);ctx.fillRect(0,8-walk,8,10);
  // Boots
  ctx.fillStyle='#3a1800';ctx.fillRect(-10,16,10,6);ctx.fillRect(2,16,10,6);
  // Body
  ctx.fillStyle='#e82020';ctx.beginPath();ctx.roundRect(-10,-2,20,12,3);ctx.fill();
  // Buttons
  ctx.fillStyle='#1a5be8';ctx.fillRect(-4,-1,8,4);
  // Arms
  ctx.fillStyle='#ffe0c0';ctx.fillRect(-14,0,6,7);ctx.fillRect(8,0,6,7);
  // Gloves
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-11,7,4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(11,7,4,0,Math.PI*2);ctx.fill();
  // Head
  ctx.fillStyle='#ffe0c0';ctx.beginPath();ctx.arc(0,-12,10,0,Math.PI*2);ctx.fill();
  // Cap
  ctx.fillStyle='#e82020';ctx.beginPath();ctx.arc(0,-16,10,Math.PI,0);ctx.fill();
  ctx.fillRect(-10,-20,20,5);ctx.fillRect(-14,-18,6,4);
  // Eyes
  ctx.fillStyle='#222';ctx.beginPath();ctx.arc(4,-13,2,0,Math.PI*2);ctx.fill();
  // Mustache
  ctx.fillStyle='#5a2800';ctx.fillRect(-7,-8,14,3);
  ctx.restore();
}

function draw(){
  ctx.fillStyle='#0a0008';ctx.fillRect(0,0,W,H);
  if(flashTimer>0){ctx.fillStyle=`rgba(255,100,0,${flashTimer/8*0.15})`;ctx.fillRect(0,0,W,H);}
  drawPlatforms();drawLadders();
  // Fire at base
  fireParticles.forEach(fp=>{
    let hue=fp.life>0.6?30:fp.life>0.3?15:0;
    ctx.globalAlpha=fp.life*0.9;ctx.fillStyle=`hsl(${hue},100%,${50+fp.life*30}%)`;
    ctx.beginPath();ctx.arc(fp.x,fp.y,fp.size,0,Math.PI*2);ctx.fill();
  });ctx.globalAlpha=1;
  drawDK();drawPrincess();
  barrels.forEach(drawBarrel);
  drawMario();
  particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);});ctx.globalAlpha=1;
  // Lives icons
  for(let i=0;i<lives;i++){
    ctx.save();ctx.translate(8+i*22,H-12);ctx.fillStyle='#e82020';
    ctx.beginPath();ctx.arc(0,-8,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a5be8';ctx.fillRect(-5,0,10,7);ctx.restore();
  }
  // "BONUS +100" popup
  particles.filter(p=>p.text).forEach(p=>{
    ctx.globalAlpha=p.life;ctx.fillStyle='#ff0';ctx.font='500 11px monospace';
    ctx.textAlign='center';ctx.fillText('+100',p.x,p.y);ctx.textAlign='left';
  });ctx.globalAlpha=1;
}

keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;keys[e.code]=true;
  if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;keys[e.code]=false;});

// Touch / swipe
let ts=null;
C.addEventListener('touchstart',e=>{ts={x:e.touches[0].clientX,y:e.touches[0].clientY};e.preventDefault();
  keys[' ']=true;setTimeout(()=>keys[' ']=false,120);
},{passive:false});
C.addEventListener('touchend',e=>{
  if(!ts)return;
  let dx=e.changedTouches[0].clientX-ts.x,dy=e.changedTouches[0].clientY-ts.y;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>12){keys['ArrowRight']=dx>0;keys['ArrowLeft']=dx<0;setTimeout(()=>{keys['ArrowRight']=false;keys['ArrowLeft']=false;},200);}
  else if(Math.abs(dy)>12){if(dy<0){keys['ArrowUp']=true;setTimeout(()=>keys['ArrowUp']=false,200);}}
  ts=null;e.preventDefault();
},{passive:false});

document.getElementById('startBtn').addEventListener('click',()=>init(false));
function loop(){update();draw();raf=requestAnimationFrame(loop);}
loop();
</script>
